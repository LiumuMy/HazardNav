# =========================================================================
# disaster_sim 参数配置
# =========================================================================
#
# 三种灾害源类型 (source_type) 的含义 / 单位约定:
#   fire       — 火灾热源,     C0 单位建议使用 °C
#   gas        — 有毒气体,     C0 单位建议使用 ppm
#   pollution  — 污染颗粒物,   C0 单位建议使用 μg/m³
#
# 扩散算法 (algorithm):
#   geodesic   — 基于测地距离 BFS + 指数衰减 (轻量, 默认)
#                C(x) = C0 * exp(-alpha * d_geodesic(x, source))   [单位: 1/m]
#   diffusion  — 基于扩散方程 Jacobi 数值迭代 (更"物理")
#                稳态 Laplacian + 每步 decay, 源/墙作 Dirichlet
#
# 两种算法均严格以 /combined_grid 中的墙体 (值=100) 作为边界,
# 不会穿透任何障碍物扩散。
#
# =========================================================================
# 到达判定的几何必读 (非常重要, 不看这里会"一启动就判到达"):
# -------------------------------------------------------------------------
# 机器人每 tick 订阅 /hazard/sample 读到自己所在格子的浓度/温度,
# 一旦读数 >= arrival_sample_threshold 就判定已到达源头.
#
# geodesic 模型下, 机器人距离源头 d (m) 处的读数为:
#        sample(d) = C0 * exp(-alpha * d)
#
# 反解出触发到达的距离 d_trig:
#        d_trig = (1/alpha) * ln( C0 / arrival_sample_threshold )
#
# 举例 (就是当前默认组合):
#   C0 = 600, alpha = 0.5, arrival_sample_threshold = 350
#   d_trig = (1/0.5) * ln(600/350) ≈ 2 * 0.539 ≈ 1.08 m
#   —— 机器人走到距离源头 ≈1.08m 内就停, 合理.
#
# 陷阱:
# - 如果你把 C0 调大 (比如 5000) 而 arrival_sample_threshold 保持 350,
#   那么 d_trig 会扩到 4~5m, 机器人可能一出生就被判到达原地不动.
# - 如果源头离机器人起点本身就在 1m 内, 必须同时把 arrival_sample_threshold
#   调得更接近 C0, 或者把源挪远, 否则同样原地停车.
# 建议: 先定 C0, 再根据你想要的停车半径反推 arrival_sample_threshold:
#        arrival_sample_threshold = C0 * exp(-alpha * 期望停车距离)
# =========================================================================

hazard_source_node:
  ros__parameters:
    source_type: "fire"          # fire | gas | pollution
    source_x: 6.0
    source_y: 4.0
    algorithm: "geodesic"        # geodesic | diffusion
    C0: 600.0                    # 源强度 (单位与 source_type 对应)
    alpha: 0.5                   # 测地指数衰减系数 (1/m)
                                  # 经验: alpha=0.5 → 距离 2m 衰减到 ≈e^-1=37%
                                  #       alpha=1.0 → 距离 1m 衰减到 37% (扩散更窄)
    diffusion_iters: 250         # diffusion 算法下的 Jacobi 迭代次数
                                  # 稳态收敛参考: 250 足够 150x150 下收敛
    diffusion_decay: 0.015       # diffusion 算法下每步的体积损耗 (0~1)
                                  # 越大衰减越快, 扩散范围越小
    publish_rate_hz: 1.0
    frame_id: "map"
    downsample: 4                # 扩散场计算降采样倍率, 纯加速, 不影响正确性
                                  # 600x600 栅格取 4 → 在 150x150 上计算 BFS/迭代
                                  # 再最近邻上采样回原尺寸
                                  # 取值建议:
                                  #   栅格 <200     -> 1 (不降采样)
                                  #   200~500      -> 2~3
                                  #   500~1000     -> 4 (推荐, 本项目默认)
                                  #   >1000        -> 6~8, 否则 BFS 会卡住不返回
                                  # 注: 墙体按"任一子格为墙则聚合格为墙"聚合,
                                  #     不会出现扩散"穿墙"的语义退化

gradient_explorer_node:
  ros__parameters:
    goal_topic: "/goal_pose"
    frame_id: "map"
    update_period_sec: 0.5         # 跟踪 tick 周期 (s). 默认 0.5s 以便 TK 面板
                                    # 改源后机器人能在 <1s 内响应. 0.2~1.0 之间
                                    # 任取, 太低会让 goal 频繁重发拖累 A*.
    goal_lookahead_m: 1.8          # 每次生成的中间目标距离机器人多远. BFS 模式下
                                    # 等于"沿 BFS 父链回溯取 lookahead_m 处的点",
                                    # 所以这个值不是上限, 最远可以到场最高可达点.
    search_radius_m: 8.0           # BFS 可达域探索半径 (Chebyshev, m).
                                    # v1 Sobel 模式用 3.0 即可, v2 BFS 要让机器人
                                    # "看得见墙对面的开口", 8m 比较稳. 大地图调到 12~15.
    obstacle_clearance_cells: 3    # 墙膨胀半径 (cells). BFS 会把墙膨胀 pad 格后
                                    # 再做可达性搜索, 保证机器人不啃墙. 走廊窄时
                                    # (<=2*pad*res) BFS 会走不通, 见 bfs_relax_pad_on_stuck.
    arrival_sample_threshold: 350.0 # 传感器读数 >= 该阈值 → 判定到达并停车锁定
                                    # 默认配合 C0=600, alpha=0.5 → ≈1.07m 内触发
                                    # 想更早停: 调低阈值; 想更靠近源: 调高阈值
                                    # 注意: 阈值必须 < C0, 否则永远无法到达
    arrival_distance_m: 0.8         # (备份判定) 到达锚点 <=0.8m 时纯追踪会自行停
    min_field_to_move: 0.001       # 整张场最大值低于此值时不下发目标
                                    # 扩散初期场还没铺开, 防止无意义出发
    # --- 纯场驱动 BFS（主路径，无源位置先验）---
    # 不订阅 /hazard/source_gt，不使用任何源坐标信息导航。
    # 仅用 /hazard/field 在膨胀后的 /combined_grid 可达域上做场值最大化 BFS。
    verbose_goal_log: true         # true: 每次目标点方法/位置有变化时 INFO 一次,
                                    # 方便实车调试时定位 "到底选了哪条路径".

    # --- 场最高可达点 BFS（主决策）---
    use_bfs_goal: true             # true: 在 /combined_grid 膨胀后的可达域里 BFS,
                                    # 找 /hazard/field 最高的可达格, 父链回溯发目
                                    # 标. 机器人完全依靠场梯度自主趋近源头, 无需任何
                                    # 源位置先验. false: 退化到 Sobel 局部梯度射线.
    max_bfs_cells: 80000           # 单 tick BFS 访问的最大格子数, 大地图用它做时间
                                    # 上限. 600x600 栅格 80k 大约 150~300ms.
                                    # 想更快响应改小 (40000), 想更远探索改大 (150000).
    min_field_gain: 0.5            # BFS 专用: 场最高格相对起点格的最小增益.
                                    # 低于此认为 "原地已是最高", 让到达判据接管.
    bfs_relax_pad_on_stuck: true   # BFS 路径通用: 标准 pad 下找不到目标 (机器人被
                                    # 膨胀圈覆盖/走廊过窄) 时自动把 pad-2 再试一次.
                                    # 防止启动瞬间贴墙无法出发.
    # --- "时刻检测": 到达后自动解除锁定的条件 (满足任一即解锁重新追踪) ---
    source_move_release_m: 0.3     # 已到达状态下, 若 /hazard/source_gt 相对
                                    # "到达瞬间记录的源位置" 移动超过该距离,
                                    # 立即解锁并沿新梯度重新出发. 推荐 0.2~0.5m,
                                    # 过小容易被抖动误触, 过大会忽略小挪动.
    sample_release_ratio: 0.5      # 备份判定: 读数跌到 threshold*ratio 以下也解锁
                                    # 覆盖 C0 调小 / 算法切换 / 源挪到墙后 等场景
                                    # 设 0 可禁用该判据, 只用源位置变化触发

hazard_gazebo_visual_node:
  ros__parameters:
    source_type: "fire"          # fire | gas | pollution; 只影响 Gazebo 里的显示样式
    source_x: 6.0                # 与 hazard_source_node 的 source_x 保持一致, 否则 RViz/Gazebo 会错位
    source_y: 4.0
    entity_name: "hazard_source_viz"
    update_period_sec: 2.0       # 每 2s 检查参数是否变更; 变更则 delete+respawn
    ground_offset_z: -1.0        # -1 = 按类型取默认高度 (fire=0.55, gas=0.95, pollution=0.75)
    spawn_timeout_sec: 30.0      # 等 /spawn_entity 服务就绪的最长时间 (Gazebo 首次加载慢)
